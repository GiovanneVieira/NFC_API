services:
  api:
    build: .
    ports:
      - '3000:3000'
    env_file:
      - .env.development
    # Dentro da rede do compose, a API acessa os serviços pelos NOMES
    # (não 'localhost'). Estes overrides garantem que o container 'api'
    # conecte no Postgres/Redis/MQTT corretos, independente do .env.development
    # (que usa 'localhost' para quando o Nest roda no host pelo terminal).
    environment:
      - DATABASE_URL=postgresql://admin:admin@postgres:5432/nfc_local_db?schema=public
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
    volumes:
      - /app/node_modules
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
            - prisma/
        - action: rebuild
          path: package*.json
        - action: rebuild
          path: prisma/schema.prisma
    depends_on:
      - postgres
      - redis
      - mosquitto
    networks:
      - nfc-net

  postgres:
    image: postgres:16-alpine
    container_name: nfc-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nfc_local_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - nfc-net

  redis:
    image: redis:7-alpine
    container_name: nfc-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    networks:
      - nfc-net

  mosquitto:
    image: eclipse-mosquitto
    container_name: nfc-mosquitto
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - nfc-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: nfc-pgadmin
    restart: unless-stopped
    ports:
      - '5050:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres
    networks:
      - nfc-net

volumes:
  pgdata:
  mosquitto-data:
  mosquitto-log:

networks:
  nfc-net:
    driver: bridge